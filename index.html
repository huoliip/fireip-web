<!DOCTYPE html><html lang="zh-CN"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>FireIP - 优质代理服务</title>    <script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>    <style>        :root { --primary: #2563eb; --accent: #10b981; --bg: #f8fafc; }        body { font-family: -apple-system, sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }                .container { width: 100%; max-width: 800px; }                .card, .tool-box, .features, .brand-box {               background: white; padding: 20px; border-radius: 20px;               box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; box-sizing: border-box;        }
        #logo { width: 80px; display: block; margin: 0 auto 10px; }        h2 { margin: 5px 0; font-size: 18px; text-align: center; }        .btn-link { display: block; background: var(--primary); color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; text-align: center; }
        .tool-box { width: 100%; }        textarea { width: 100%; height: 120px; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; resize: vertical; }        
        .protocol-select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; }
        #qrcode { display:flex; justify-content:center; margin-top:15px; }        #socksURLContainer { margin-top: 15px; word-break: break-all; color: #333; font-size: 13px; line-height: 1.4; text-align: center; }
        .features { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }        .feature-item { padding: 10px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 12px; text-align: center; }        .feature-item b { display: block; color: var(--primary); font-size: 14px; margin-bottom: 5px; }
        .brand-box { border: 2px solid var(--primary); }        .brand-title { text-align: center; font-weight: bold; color: var(--primary); margin-bottom: 10px; }        .price-tag { text-align: center; color: #dc2626; font-weight: bold; font-size: 14px; margin-bottom: 15px; background: #fee2e2; padding: 5px; border-radius: 5px; }                /* 电脑端保持一行4个不变 */        .brand-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }        .brand-item { font-size: 12px; color: #475569; background: #f1f5f9; padding: 8px; border-radius: 6px; text-align: center; }
        /* 手机端专门优化：保持4列，缩小字体和间距 */        @media (max-width: 480px) {            .brand-grid { gap: 4px; }            .brand-item { font-size: 9px; padding: 6px 2px; }            .brand-box { padding: 10px; }        }    </style></head><body>
<div class="container">    <div class="card">        <img id="logo" src="https://raw.githubusercontent.com/qianchen8858-dot/my-images/main/photo_2024-12-11_00-42-27.jpg">        <h2>FireIP 火力海外代理</h2>        <a class="btn-link" href="https://huo.onip.cc/">点击咨询/购买服务</a>    </div>
    <div class="tool-box">        <textarea id="inputText" placeholder="格式: 地址:端口:账号:密码"></textarea>        <select id="protocolSelect" class="protocol-select">            <option value="socks://">SOCKS5</option>            <option value="http://">HTTP</option>        </select>        <button onclick="generateQRCode()">生成专属二维码</button>        <div id="qrcode"></div>        <div id="socksURLContainer"></div>    </div>
    <div class="features">        <div class="feature-item"><b>全球覆盖</b>190+ 国家原生</div>        <div class="feature-item"><b>极速稳定</b>低延迟秒连</div>        <div class="feature-item"><b>独享节点</b>纯净不跳跃</div>        <div class="feature-item"><b>全天客服</b>响应更及时</div>    </div>
    <div class="brand-box">        <div class="brand-title">官方授权代理品牌</div>        <div class="price-tag">全网最低价，有量有价，欢迎询盘</div>        <div class="brand-grid">            <div class="brand-item">711proxy.com</div>            <div class="brand-item">kookeey.com</div>            <div class="brand-item">cliproxy.com</div>            <div class="brand-item">b2proxy.com</div>            <div class="brand-item">lokiproxy.com</div>            <div class="brand-item">iprocket.io</div>            <div class="brand-item">ipweb.cc</div>            <div class="brand-item">ipwo.net</div>        </div>    </div></div>
<script>    function generateQRCode() {        var rawText = document.getElementById('inputText').value;        var proto = document.getElementById('protocolSelect').value;        var lines = rawText.split('\n').filter(line => line.trim() !== "");        var container = document.getElementById('socksURLContainer');        var qrcodeDiv = document.getElementById('qrcode');        container.innerHTML = '';        qrcodeDiv.innerHTML = '';

        lines.forEach(function(line) {            var p = line.split(':');            if(p.length >= 4) {                var url;                if (proto === "http://") {                    // 生成 http://user:pass@ip:port 格式
                    url = "http://" + p[2] + ":" + p[3] + "@" + p[0] + ":" + p[1];                } else {                    // SOCKS5 原有加密格式
                    url = proto + btoa(p[2] + ':' + p[3]) + '@' + p[0] + ':' + p[1] + '#' + p[0];                }
                var div = document.createElement('div');                div.style.marginBottom = "8px";                div.textContent = url;                container.appendChild(div);
                // 二维码使用第一个地址
                if (container.children.length === 1) {                    new QRCode(qrcodeDiv, { text: url, width: 200, height: 200 });                }            }        });    }</script></body></html>
