<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FireIP - 优质代理服务</title>
    <script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #2563eb; --accent: #10b981; --bg: #f8fafc; }
        body { font-family: Arial, Helvetica, sans-serif; background-color: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 800px; }
        .card, .tool-box, .brand-box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 20px; box-sizing: border-box; }
        #logo { width: 80px; display: block; margin: 0 auto 10px; }
        h2 { margin: 5px 0; font-size: 18px; text-align: center; }
        .btn-link { display: block; background: #2563eb; color: white; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; text-align: center; cursor: pointer; font-size: 13px; }
        .tool-box { width: 100%; }
        textarea { width: 100%; height: 120px; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; resize: vertical; font-family: Arial, Helvetica, sans-serif; font-size: 14px; color: #333; }
        .protocol-select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; font-size: 16px; font-family: Arial, Helvetica, sans-serif; }
        button { width: 100%; padding: 14px; background: #10b981; color: white; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; }
        #qrcode { display:flex; justify-content:center; margin-top:15px; }
        #socksURLContainer { margin-top: 15px; word-break: break-all; color: #333; font-size: 13px; line-height: 1.4; text-align: center; font-family: Arial, Helvetica, sans-serif; }
        
        /* 按钮网格布局：每行两个，整整齐齐 */
        .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        
        .features-inline { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .feature-item { padding: 8px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 11px; text-align: center; }
        .feature-item b { display: block; color: #2563eb; font-size: 12px; margin-bottom: 2px; }
        .brand-box { border: 2px solid #2563eb; }
        .brand-title { text-align: center; font-weight: bold; color: #2563eb; margin-bottom: 10px; }
        .price-tag { text-align: center; color: #dc2626; font-weight: bold; font-size: 14px; margin-bottom: 15px; background: #fee2e2; padding: 5px; border-radius: 5px; }
        .brand-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .brand-item { font-size: 11px; color: #475569; background: #f1f5f9; padding: 10px 2px; border-radius: 6px; text-align: center; }
        @media (max-width: 480px) { .brand-grid { gap: 4px; } .brand-item { font-size: 9px; padding: 6px 2px; } .brand-box { padding: 10px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <img id="logo" src="https://raw.githubusercontent.com/qianchen8858-dot/my-images/main/photo_2024-12-11_00-42-27.jpg">
        <h2>FireIP 火力海外代理</h2>
        <a class="btn-link" href="https://huo.onip.cc/">点击咨询/购买静态</a>
    </div>
    
    <div class="tool-box">
        <textarea id="inputText" placeholder="格式: 地址:端口:账号:密码 (每一行一个IP)"></textarea>
        <select id="protocolSelect" class="protocol-select">
            <option value="socks://">SOCKS5</option>
            <option value="http://">HTTP</option>
        </select>
        <button onclick="generateQRCode()">生成专属二维码</button>
        <div id="qrcode"></div>
        <div id="socksURLContainer"></div>
    </div>
    
    <div class="card">
        <h3 style="font-size: 16px; margin-bottom: 10px; text-align: center;">💡 选购建议 & 联系我们</h3>
        <ul style="font-size: 13px; text-align: left; color: #475569; padding-left: 20px; margin-bottom: 15px; font-family: Arial, Helvetica, sans-serif;">
            <li><b>静态 IP：</b> 专用于电商防关联及社交媒体长期维护。</li>
            <li><b>动态 IP：</b> 专用于网页采集、竞价监测及批量营销。</li>
        </ul>
        
        <div class="contact-grid">
            <a class="btn-link" style="background: #059669;" href="mqqapi://card/show_pslcard?src_type=internal&version=1&uin=272734257&card_type=person&source=qrcode">跳转添加QQ</a>
            <a class="btn-link" style="background: #2563eb;" href="https://t.me/huoli_proxy" target="_blank">进入TG频道</a>
            <a class="btn-link" style="background: #2563eb;" href="https://t.me/huoliIP" target="_blank">联系TG客服</a>
            <a class="btn-link" style="background: #10b981;" onclick="alert('请手动添加微信：a15016410566')">点击获取微信</a>
        </div>
    </div>
</div>
<script>
    function generateQRCode() {
        var rawText = document.getElementById('inputText').value;
        var proto = document.getElementById('protocolSelect').value;
        var lines = rawText.split('\n').filter(line => line.trim() !== "");
        var container = document.getElementById('socksURLContainer');
        var qrcodeDiv = document.getElementById('qrcode');
        container.innerHTML = '';
        qrcodeDiv.innerHTML = '';
        lines.forEach(function(line) {
            var p = line.split(':');
            if(p.length >= 4) {
                var url;
                if (proto === "http://") {
                    url = "http://" + p[2] + ":" + p[3] + "@" + p[0] + ":" + p[1];
                } else {
                    url = proto + btoa(p[2] + ':' + p[3]) + '@' + p[0] + ":" + p[1] + '#' + p[0];
                }
                var div = document.createElement('div');
                div.style.marginBottom = "8px";
                div.textContent = url;
                container.appendChild(div);
                if (container.children.length === 1) {
                    new QRCode(qrcodeDiv, { text: url, width: 200, height: 200 });
                }
            }
        });
    }
</script>
</body>
</html>
